<!DOCTYPE html>
<html>
<head><title>Netlify Forms</title></head>
<body>
  <!-- Netlify form detection for Next.js -->
  <form name="quote-request" netlify data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="full-name" />
    <input type="text" name="address" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <select name="insurance-type">
      <option value="Home">Home</option>
      <option value="Auto">Auto</option>
      <option value="Life">Life</option>
      <option value="Commercial">Commercial</option>
      <option value="Other">Other</option>
    </select>
    <input type="text" name="vehicle-year-make-model" />
    <input type="text" name="vin-number" />
    <textarea name="message"></textarea>
    <input type="checkbox" name="tcpa-consent-checkbox" />
    <input type="hidden" name="tcpa-consent" />
    <input type="hidden" name="tcpa-consent-timestamp" />
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
